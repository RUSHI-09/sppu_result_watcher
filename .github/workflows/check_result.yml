name: Check SPPU Result

on:
  # schedule:
  #   - cron: "*/10 * * * *"   # every 10 minutes (disabled in favor of cron-job.org for consistency)
  workflow_dispatch: {}       # lets you trigger it via cron-job.org or manually from the dashboard

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Build TypeScript
        run: npm run build

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npm start

      - name: Commit state if changed
        run: |
          if [[ -n $(git status --porcelain state.json 2>/dev/null) ]]; then
            git config user.name "result-watcher-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "Update alert state"
            git pull --rebase origin main || git rebase --skip
            git push
          fi
